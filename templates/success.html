<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Successful!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .success-card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }
        .checkmark-circle {
            width: 80px;
            height: 80px;
            background: #28a745;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 1.5rem auto;
        }
        .btn-home {
            background-color: #0d6efd;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            transition: 0.3s;
        }
        .btn-home:hover {
            background-color: #0b5ed7;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="checkmark-circle">
            ✓
        </div>
        <h2 class="fw-bold text-dark">Awesome, {{ name }}!</h2>
        <p class="text-muted mb-4">
            Your registration is confirmed. We've sent your <strong>Event Pass</strong> to your registered email address.
        </p>
        
        <div class="alert alert-info py-2" style="font-size: 0.9rem;">
            Please check your <strong>Spam/Junk</strong> folder if you don't see it in your Inbox.
        </div>

        <hr class="my-4">
        
        <a href="/" class="btn btn-primary btn-home w-100">
            Back to Events
        </a>
    </div>

</body>
</html>
