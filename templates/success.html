{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <div class="card shadow-sm p-5 border-0 bg-white">
            <div class="mb-4">
                <div class="display-1 text-success">✓</div>
            </div>
            <h2 class="fw-bold">Registration Received!</h2>
            <p class="text-muted mb-4">
                Your request has been sent to the event coordinators. 
                Once verified, your <strong>Event Pass</strong> will be sent to your registered email manually by the admin.
            </p>
            <div class="d-grid gap-2 d-md-block">
                <a href="/" class="btn btn-primary px-4">Back to Events</a>
                <a href="https://mail.google.com" target="_blank" class="btn btn-outline-secondary px-4">Check Gmail</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
