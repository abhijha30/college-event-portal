{% extends 'base.html' %}
{% block content %}
<h2 class="mb-4">Upcoming College Events</h2>
<div class="row">
    {% for event in events %}
    <div class="col-md-4 mb-4">
        <div class="card h-100 shadow-sm">
            <div class="card-body">
                <h5 class="card-title fw-bold">{{ event.title }}</h5>
                <p class="card-text text-muted">{{ event.description }}</p>
                <p class="badge bg-info text-dark">{{ event.date }}</p>
                <a href="/register_event/{{ event.id }}" class="btn btn-primary w-100 mt-2">Register Now</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
