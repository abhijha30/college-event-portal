<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>College Events</title>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="text-center mb-4">Upcoming Events</h2>
        <div class="row">
            <div class="col-md-6 mx-auto">
                <div class="card shadow">
                    <div class="card-body">
                        <h5 class="card-title">Tech Talk 2024</h5>
                        <p>Join us for a session on AI and Web Dev.</p>
                        <form action="/register" method="POST">
                            <input type="hidden" name="event_name" value="TechTalk2024">
                            <input type="text" name="name" class="form-control mb-2" placeholder="Your Name" required>
                            <input type="email" name="email" class="form-control mb-2" placeholder="Your Email" required>
                            <button type="submit" class="btn btn-primary w-100">Register & Get Pass</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
