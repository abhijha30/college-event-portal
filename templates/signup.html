{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4 shadow">
            <h3 class="text-center">Student Signup</h3>
            <form method="POST">
                <input type="text" name="name" class="form-control mb-3" placeholder="Full Name" required>
                <input type="email" name="email" class="form-control mb-3" placeholder="Email Address" required>
                <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>
                <div class="row">
                    <div class="col-8"><input type="text" name="roll" class="form-control mb-3" placeholder="Roll No" required></div>
                    <div class="col-4"><input type="text" name="sec" class="form-control mb-3" placeholder="Sec" required></div>
                </div>
                <select name="course" class="form-select mb-4" required>
                    <option value="" disabled selected>Select Course</option>
                    <option value="BCA">BCA</option>
                    <option value="BBA">BBA</option>
                </select>
                <button class="btn btn-primary w-100">Create Account</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
